name: Deploy SoilCoverScan v6.21

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-v6.21.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: SoilCoverScan v6.21 rekonstruieren und prüfen
        shell: bash
        run: |
          set -euo pipefail
          cat .deploy/v6.21.part* > /tmp/soilcoverscan-v6.21.b64
          base64 --decode /tmp/soilcoverscan-v6.21.b64 | gzip -dc > index.html
          echo "614be8a389b38c775556ddcd90c1423d63367bec46c10a3b40f49f430833be0b  index.html" | sha256sum --check -
          grep -Fq 'const APP_VERSION = "v6.21";' index.html

      - name: Aktualisierung committen
        shell: bash
        run: |
          set -euo pipefail
          rm -f .deploy/v6.21.part*
          rmdir .deploy 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release SoilCoverScan v6.21"
          git push

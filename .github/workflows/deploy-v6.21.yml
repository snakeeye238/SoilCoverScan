name: Deploy SoilCoverScan v6.21

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'release-v6.21'
    runs-on: ubuntu-latest
    steps:
      - name: Arbeitsbranch auschecken
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: SoilCoverScan v6.21 rekonstruieren und prüfen
        shell: bash
        run: |
          set -euo pipefail
          cat .deploy/v6.21.part* > /tmp/soilcoverscan-v6.21.b64
          base64 --decode /tmp/soilcoverscan-v6.21.b64 | gzip -dc > index.html
          echo "614be8a389b38c775556ddcd90c1423d63367bec46c10a3b40f49f430833be0b  index.html" | sha256sum --check -
          grep -Fq 'const APP_VERSION = "v6.21";' index.html

      - name: Geprüfte Version committen
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f .deploy/v6.21.part* .deploy/trigger-v6.21
          rmdir .deploy 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release SoilCoverScan v6.21"
          git push origin "HEAD:${HEAD_BRANCH}"

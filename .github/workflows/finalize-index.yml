name: Finalize SoilCoverScan index

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct exact index.html
        shell: bash
        run: |
          set -euo pipefail
          cat assets/soilcoverscan-v6.21/part*.b64 > /tmp/soilcoverscan-v6.21.b64
          base64 --decode /tmp/soilcoverscan-v6.21.b64 | gzip -dc > index.html
          echo "614be8a389b38c775556ddcd90c1423d63367bec46c10a3b40f49f430833be0b  index.html" | sha256sum --check -
          grep -Fq 'const APP_VERSION = "v6.21";' index.html

      - name: Commit single-file release
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets
          rm -f .github/workflows/finalize-index.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy SoilCoverScan v6.21 as index.html"
          git push

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // --- KONFIGURATION ---
        const API_KEY_STORAGE_KEY = 'soilcoverscan_api_key';

        const getStoredApiKey = () => {
            try {
                return typeof window !== 'undefined' ? (window.localStorage.getItem(API_KEY_STORAGE_KEY) || '') : '';
            } catch (storageError) {
                console.warn('API-Key konnte nicht aus dem Local Storage geladen werden:', storageError);
                return '';
            }
        };

        const setStoredApiKey = (value) => {
            try {
                window.localStorage.setItem(API_KEY_STORAGE_KEY, value);
            } catch (storageError) {
                console.warn('API-Key konnte nicht im Local Storage gespeichert werden:', storageError);
            }
        };

        const APP_VERSION = "v6.20";
        const APP_NAME = "SoilCoverScan";
        const CALIBRATION_IMAGE_MAX_EDGE = 1600;
        const DEFAULT_ZOOM_MAX = 50;
        const CALIBRATION_ZOOM_MAX = 80;
        const CALIBRATION_SOIL_MARK_COLOR = {
            r: 236,
            g: 72,
            b: 153,
            rgba: 'rgba(236,72,153,0.3)'
        };
        const TEXTURE_SCALES = [
            { radius: 1, weight: 0.5 },
            { radius: 3, weight: 0.3 },
            { radius: 6, weight: 0.2 }
        ];
        const TEXTURE_FIBER_SPREAD_RADII = [2, 4];
        const FIBROUS_DEAD_MIN = 18;

        const DEFAULT_COLOR_THRESHOLDS = {
            living: { hueMin: 45, hueMax: 170, satMin: 8, satMax: 100, valMin: 12, valMax: 100 },
            soil: {
                hueMin: 0,
                hueMax: 55,
                satMin: 0,
                satMax: 42,
                valMin: 8,
                valMax: 42,
                textureMin: 0,
                textureMax: 100
            },
            stone: { satMin: 0, satMax: 14, blackValMax: 12, whiteValMin: 82 },
            dead: { hueMin: 20, hueMax: 68, satMin: 10, satMax: 100, valMin: 38, valMax: 100 }
        };
        const cloneThresholds = () => JSON.parse(JSON.stringify(DEFAULT_COLOR_THRESHOLDS));
        const setNestedThresholdValue = (thresholdSet, category, field, value) => ({
            ...thresholdSet,
            [category]: {
                ...thresholdSet[category],
                [field]: value
            }
        });

        const createThresholdSlider = ({ id, label, category, field, min, max, suffix = '%', visual = 'neutral' }) => ({
            id,
            type: 'single',
            label,
            min,
            max,
            suffix,
            visual,
            getValue: (thresholdSet) => thresholdSet[category][field],
            applyValue: (thresholdSet, value) => setNestedThresholdValue(thresholdSet, category, field, value)
        });

        const createThresholdRangeSlider = ({
            id,
            label,
            category,
            lowerField,
            upperField,
            min,
            max,
            suffix = '%',
            visual = 'neutral',
            lowerLabel = 'von',
            upperLabel = 'bis',
            lowerThumb = '#16a34a',
            upperThumb = '#2563eb',
            lowerRing = 'rgba(22, 163, 74, 0.25)',
            upperRing = 'rgba(37, 99, 235, 0.25)',
            markers = []
        }) => ({
            id,
            type: 'range',
            label,
            min,
            max,
            suffix,
            visual,
            lowerLabel,
            upperLabel,
            lowerThumb,
            upperThumb,
            lowerRing,
            upperRing,
            markers,
            getValue: (thresholdSet) => ({
                lower: thresholdSet[category][lowerField],
                upper: thresholdSet[category][upperField]
            }),
            applyLowerValue: (thresholdSet, value) => setNestedThresholdValue(thresholdSet, category, lowerField, value),
            applyUpperValue: (thresholdSet, value) => setNestedThresholdValue(thresholdSet, category, upperField, value)
        });

        const getHueColor = (hue, saturation = 85, lightness = 52) => `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        const getHueRing = (hue) => `hsla(${hue}, 85%, 52%, 0.28)`;
        const getHueGradient = (hues) => `linear-gradient(90deg, ${hues.map(hue => getHueColor(hue)).join(', ')})`;
        const createHueSliderVisual = (hues) => ({
            track: getHueGradient(hues),
            thumb: (value) => getHueColor(value),
            ring: (value) => getHueRing(value)
        });
        const createSaturationSliderVisual = (hue) => ({
            track: `linear-gradient(90deg, hsl(${hue}, 0%, 50%), hsl(${hue}, 100%, 45%))`,
            thumb: (value) => `hsl(${hue}, ${value}%, 45%)`,
            ring: (value) => `hsla(${hue}, ${Math.max(35, value)}%, 45%, 0.28)`
        });
        const createBrightnessSliderVisual = (hue) => ({
            track: `linear-gradient(90deg, #020617, hsl(${hue}, 85%, 43%), #f8fafc)`,
            thumb: (value) => `hsl(${hue}, 85%, ${Math.max(14, Math.min(86, value))}%)`,
            ring: (value) => `hsla(${hue}, 85%, ${Math.max(24, Math.min(76, value))}%, 0.28)`
        });
        const createFixedSliderVisual = ({ track, thumb, ring }) => ({
            track,
            thumb: () => thumb,
            ring: () => ring
        });

        const SLIDER_VISUALS = {
            livingHueRange: createHueSliderVisual([45, 55, 70, 95, 120, 155, 190, 220, 240]),
            livingSaturation: createSaturationSliderVisual(140),
            livingBrightness: createBrightnessSliderVisual(140),
            soilYellow: createHueSliderVisual([18, 28, 38, 48, 58, 68]),
            soilTexture: createFixedSliderVisual({
                track: 'linear-gradient(90deg, #d6d3d1, #a16207, #0f172a)',
                thumb: '#a16207',
                ring: 'rgba(161, 98, 7, 0.28)'
            }),

            soilSaturation: createFixedSliderVisual({
                track: 'linear-gradient(90deg, #94a3b8, #a16207, #7c2d12)',
                thumb: '#a16207',
                ring: 'rgba(161, 98, 7, 0.28)'
            }),
            soilBrightness: createFixedSliderVisual({
                track: 'linear-gradient(90deg, #020617, #78350f, #d6d3d1)',
                thumb: '#92400e',
                ring: 'rgba(146, 64, 14, 0.28)'

            stoneSaturation: createFixedSliderVisual({
                track: 'linear-gradient(90deg, #e2e8f0, #38bdf8, #a855f7, #f97316)',
                thumb: '#38bdf8',
                ring: 'rgba(56, 189, 248, 0.28)'
            }),

                thumb: '#f8fafc',
                ring: 'rgba(248, 250, 252, 0.28)'
            }),
            deadHue: createHueSliderVisual([20, 35, 50, 68, 85]),
            deadSaturation: createSaturationSliderVisual(48),
            deadBrightness: createBrightnessSliderVisual(48),
            neutral: createFixedSliderVisual({
                track: 'linear-gradient(90deg, #475569, #94a3b8)',
                thumb: '#94a3b8',
                ring: 'rgba(148, 163, 184, 0.25)'

        };

            return {

        const rgbToHsv = (r, g, b) => {

            const d = max - min;
            
            let h = 0;
            const s = max === 0 ? 0 : d / max;
            const v = max;

            if (max !== min) {
                switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }

            return [h * 360, s * 100, v * 100];

            for (let sourceIndex = 0, hsvIndex = 0; sourceIndex < (rgbaData?.length || 0); sourceIndex += 4, hsvIndex += 3) {

            const dominantDirections = new Uint8Array(TEXTURE_SCALES.length);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const pixelIndex = y * width + x;
                    let weightedContrast = 0;
                    let weightedFibrousness = 0;

                    for (let scaleIndex = 0; scaleIndex < TEXTURE_SCALES.length; scaleIndex++) {

                        const xPrev = Math.max(0, x - radius);

                        directionResponses[2] = Math.abs(grayData[nextRow + xNext] - grayData[previousRow + xPrev]);
                        directionResponses[3] = Math.abs(grayData[previousRow + xNext] - grayData[nextRow + xPrev]);

                        let responseSum = 0;
                        let maxResponse = -1;
                        let secondResponse = -1;
                        let dominantDirection = 0;

                        for (let directionIndex = 0; directionIndex < directionResponses.length; directionIndex++) {
                            const response = directionResponses[directionIndex];
                            responseSum += response;

                            if (response > maxResponse) {
                                secondResponse = maxResponse;
                                maxResponse = response;
                                dominantDirection = directionIndex;
                            } else if (response > secondResponse) {
                                secondResponse = response;
                            }
                        }

                        weightedContrast += weight * (responseSum / directionResponses.length);
                        const directionalDominance = (maxResponse - Math.max(0, secondResponse)) / (maxResponse + 8);

            const stoneNeutralMatch = s >= (currentThresholds.stone.satMin || 0) && s <= currentThresholds.stone.satMax;
            const stoneBrightnessMatch = v >= currentThresholds.stone.blackValMax && v <= currentThresholds.stone.whiteValMin;
            const deadMatch = isHueInRange(h, currentThresholds.dead.hueMin, currentThresholds.dead.hueMax)
                && s >= currentThresholds.dead.satMin
                && s <= (currentThresholds.dead.satMax || 100)
                && v >= currentThresholds.dead.valMin
                && v <= (currentThresholds.dead.valMax || 100)
                && !greenish;
            const fibrousResidueColorMatch = isHueInRange(h, 10, 85) || s <= 20;
            const fibrousDeadMatch = soilMatch
                && !greenish
                && fibrousnessValue >= FIBROUS_DEAD_MIN
                && fibrousResidueColorMatch
                && v >= 18
                && v <= 92;

            if (livingGreenMatch) return 'living';
            if (fibrousDeadMatch) return 'dead';
            if (soilMatch) return 'soil';
            if (stoneNeutralMatch && stoneBrightnessMatch && !greenish) return 'stone';
            if (deadMatch) return 'dead';

            return 'dead';
        };

        const getStandardCategoryMatch = (category, r, g, b, currentThresholds, textureValue = null, fibrousnessValue = 0) => {
            const [h, s, v] = rgbToHsv(r, g, b);
            return getStandardCategoryFromHsv(r, g, b, h, s, v, currentThresholds, textureValue, fibrousnessValue) === category;
        };

        const getFirstMatchingStandardCategory = (r, g, b, currentThresholds, textureValue = null, fibrousnessValue = 0) => {
            const [h, s, v] = rgbToHsv(r, g, b);
            return getStandardCategoryFromHsv(r, g, b, h, s, v, currentThresholds, textureValue, fibrousnessValue);
        };

        const getStandardPreviewCategory = (r, g, b, currentThresholds, visibilityFilter, textureValue = null, fibrousnessValue = 0) => {
            const finalCategory = getFirstMatchingStandardCategory(r, g, b, currentThresholds, textureValue, fibrousnessValue) || getForcedStandardCategory(r, g, b, currentThresholds);
            return visibilityFilter[finalCategory] ? finalCategory : null;
        };

        const getPixelCategoryByCalibrationFromHsv = (r, g, b, h, s, v, currentThresholds, activeCalibrationPoints, activeUseStandardFallback, textureValue = null, fibrousnessValue = 0) => {
            if (activeCalibrationPoints.length > 0) {
                let bestMatch = null;
                let minDistance = Infinity;

                for (const point of activeCalibrationPoints) {
                    const dist = getCalibrationPointDistance(h, s, v, point);
                    const maxDist = Math.max(1, point.tolerance * 1.8);

                    if (dist <= maxDist && dist < minDistance) {
                        minDistance = dist;
                        bestMatch = point;
                    }
                }

                if (bestMatch) return bestMatch.category;
            }

            if (activeUseStandardFallback) {
                const standardCategory = getStandardCategoryFromHsv(r, g, b, h, s, v, currentThresholds, textureValue, fibrousnessValue);
                if (standardCategory) return standardCategory;
            }

            return 'unclassified';
        };

        const getPixelCategoryByCalibration = (r, g, b, currentThresholds, activeCalibrationPoints, activeUseStandardFallback, textureValue = null, fibrousnessValue = 0) => {
            const [h, s, v] = rgbToHsv(r, g, b);

            const safeWidth = Math.max(1, width || 1);
            const safeHeight = Math.max(1, height || 1);
            const scale = Math.min(1, maxEdge / Math.max(safeWidth, safeHeight));
            return {
                width: Math.max(1, Math.round(safeWidth * scale)),
                height: Math.max(1, Math.round(safeHeight * scale))
            };

            const rect = element?.getBoundingClientRect();
            if (!rect || !rect.width || !rect.height || !contentWidth || !contentHeight) return rect;

            const scale = Math.min(rect.width / contentWidth, rect.height / contentHeight);
            const width = contentWidth * scale;
            const height = contentHeight * scale;
            const left = rect.left + ((rect.width - width) / 2);
            const top = rect.top + ((rect.height - height) / 2);

            return {
                left,
                top,

                height,

            const parsedValues = categoryKeys.map(key => {
                const numericValue = Number.parseFloat(values?.[key]);
                return Number.isFinite(numericValue) && numericValue > 0 ? numericValue : 0;
            });

            const total = parsedValues.reduce((sum, value) => sum + value, 0);
            if (total <= 0) return null;

            const scaledValues = parsedValues.map(value => (value / total) * 100);
            const roundedValues = scaledValues.map(Math.floor);
            let remainder = 100 - roundedValues.reduce((sum, value) => sum + value, 0);

            scaledValues
                .map((value, index) => ({ index, fraction: value - Math.floor(value) }))
                .sort((a, b) => (b.fraction - a.fraction) || (a.index - b.index))
                .forEach(({ index }) => {
                    if (remainder > 0) {
                        roundedValues[index] += 1;
                        remainder -= 1;
                    }
                });

            return categoryKeys.reduce((result, key, index) => ({
                ...result,
                [key]: roundedValues[index]
            }), {});
        };

                const rect = e.currentTarget.getBoundingClientRect();
                const clientX = e.clientX - rect.left;
                const clientY = e.clientY - rect.top;
                
                const contentX = (clientX - currentPan.x) / currentZoom;
                const contentY = (clientY - currentPan.y) / currentZoom;

                const zoomSensitivity = 0.001; 
                const delta = -e.deltaY * zoomSensitivity;
                const newZoom = Math.min(Math.max(1, currentZoom + delta * currentZoom), maxZoom);

                const newPanX = clientX - contentX * newZoom;
                const newPanY = clientY - contentY * newZoom;
                
                setZoom(newZoom);
                setPan({ x: newPanX, y: newPanY });

                    const shouldApplyStandardMaskVisibility = isPreview && isCalibrationOpen && activeCalibrationMode === 'standard';
                    const effectiveFallback = remapUnclassifiedTo || activeUnclassifiedFallback;

                    for (let i = 0; i < data.length; i += 4) {
                        let category = 'unclassified'; 
                        const pixelIndex = i / 4;
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const hsvIndex = pixelIndex * 3;
                        const textureValue = textureData?.roughness
                            ? textureData.roughness[pixelIndex]
                            : (textureData ? textureData[pixelIndex] : null);
                        const fibrousnessValue = textureData?.fibrousness
                            ? textureData.fibrousness[pixelIndex]
                            : 0;
                        let h;
                        let s;
                        let v;

                        if (hsvData) {
                            h = hsvData[hsvIndex];
                            s = hsvData[hsvIndex + 1];
                            v = hsvData[hsvIndex + 2];
                        } else {
                            [h, s, v] = rgbToHsv(r, g, b);
                        }

                        // 1. Check Manual Override (Brush)
                        if (manualOverrides && manualOverrides[pixelIndex] !== 0) {
                            const overrideVal = manualOverrides[pixelIndex];
                            if (overrideVal === 1) category = 'living';
                            else if (overrideVal === 2) category = 'dead';
                            else if (overrideVal === 3) category = 'stone';
                            else if (overrideVal === 4) category = 'soil';
                        } else {
                            // 2. Algorithmic Detection
                            category = getPixelCategoryByCalibrationFromHsv(
                                r,
                                g,
                                b,
                                h,
                                s,
                                v,
                                currentThresholds,
                                activeCalibrationPoints,
                                activeUseStandardFallback,
                                textureValue,
                                fibrousnessValue
                            );

                            if (category === 'unclassified' && activeCalibrationMode === 'standard' && !isPreview) {
                                category = getForcedStandardCategory(r, g, b, currentThresholds);
                            }
                        }

                        // REMAP UNCLASSIFIED IF REQUESTED (Dynamic Fallback)
                        if (category === 'unclassified' && effectiveFallback) {
                            category = effectiveFallback;
                        }

                        counts[category]++;

                        // Coloring
                        const renderCategory = shouldApplyStandardMaskVisibility
                            ? (activeStandardMaskVisibility[category] ? category : null)
                            : category;

                        if (!renderCategory) {
                            oData[i + 3] = 0;
                            continue;
                        }

                        oData[i + 3] = 255; 
                        if (renderCategory === 'living') { oData[i] = 34; oData[i+1] = 197; oData[i+2] = 94; } // Green
                        else if (renderCategory === 'dead') { oData[i] = 255; oData[i+1] = 255; oData[i+2] = 0; } // Yellow
                        else if (renderCategory === 'stone') { oData[i] = 59; oData[i+1] = 130; oData[i+2] = 246; } // Blue
                        else if (renderCategory === 'soil') { oData[i] = CALIBRATION_SOIL_MARK_COLOR.r; oData[i+1] = CALIBRATION_SOIL_MARK_COLOR.g; oData[i+2] = CALIBRATION_SOIL_MARK_COLOR.b; } // Pink
                        else {

                            }
                        }

            // --- SETTINGS LOGIC ---
            const handleModelChange = (newModel) => {
                const nextModelConfig = getModelConfigById(newModel);
                setModelId(nextModelConfig.id);
                setThinkingLevel(nextModelConfig.defaultThinkingLevel);
            };

            const handleThinkingSliderChange = (e) => {
                const index = parseInt(e.target.value, 10);
                const nextThinkingLevel = THINKING_LEVELS[index];
                if (isThinkingLevelSupported(modelId, nextThinkingLevel)) {
                    setThinkingLevel(nextThinkingLevel);
                }
            };

            const handleThinkingBtnClick = (index) => {
                const nextThinkingLevel = THINKING_LEVELS[index];
                if (isThinkingLevelSupported(modelId, nextThinkingLevel)) {
                    setThinkingLevel(nextThinkingLevel);
                }
            };

            // --- DISCOVERY LOGIC ---
            const handleDiscoverPlants = async () => {
                if (!imageSrc) return;

                if (!getApiKey()) {
                    openApiKeyModal(
                        () => handleDiscoverPlants(),
                        'Bitte füge deinen Gemini API-Key ein, um die Pflanzenerkennung zu starten.'
                    );
                    return;
                }

                setIsDiscovering(true);
                setError(null);

                try {
                    const activeApiKey = getApiKey();
                    const imagePayload = getImagePayload(imageSrc);
                    const prompt = `
                        Analyze this agricultural soil image to identify specific plant species (both living and dead/residue).
                        
                        CRITICAL INSTRUCTION: Identify ONLY ONE representative instance for each distinct plant species or dead material type. 
                        Do NOT mark every single plant. Pick the clearest example for each type.
                        
                        Return a valid JSON object with a list "plants".
                        For each detected plant/cluster, provide:
                        - "name_de": German name (e.g. "Winterweizen", "Löwenzahn", "Weizenstroh")
                        - "name_la": Latin name
                        - "confidence": Estimated confidence between 0.0 and 1.0
                        - "box_2d": Bounding box [ymin, xmin, ymax, xmax] normalized to 1000x1000 (0-1000 scale).
                        
                        Focus on the most prominent biological features.
                    `;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${activeApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: imagePayload.mimeType, data: imagePayload.data } }
                                ]
                            }],
                            generationConfig: {
                                responseMimeType: "application/json",
                                thinkingConfig: {
                                    thinkingLevel: thinkingLevel
                                }
                            }
                        })
                    });

                    if (!response.ok) {
                         throw new Error("Fehler bei der API Anfrage: " + response.status);
                    }

                    const data = await response.json();
                    const textContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    let jsonString = textContent;
                    const jsonMatch = textContent.match(/```json\s*([\s\S]*?)\s*```/);
                    if (jsonMatch) jsonString = jsonMatch[1];
                    
                    const result = JSON.parse(jsonString);
                    setDiscoveryResult(result);
                    
                } catch (e) {
                    console.error(e);
                    setError("Fehler bei der Pflanzenerkennung: " + e.message);
                } finally {
                    setIsDiscovering(false);
                }
            };

            // --- CROP LOGIC ---
            const startCrop = (e, containerRef) => {
                e.stopPropagation();
                e.preventDefault();
                setIsDraggingCrop(true);
                const rect = containerRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                setCropStart({ x, y });
                setCropRect({ x, y, w: 0, h: 0 });
            };

            const moveCrop = (e, containerRef) => {
                if (!isDraggingCrop) return;
                e.preventDefault();
                e.stopPropagation();
                const rect = containerRef.current.getBoundingClientRect();
                const currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
                const width = Math.abs(currentX - cropStart.x);
                const height = Math.abs(currentY - cropStart.y);
                const x = Math.min(currentX, cropStart.x);
                const y = Math.min(currentY, cropStart.y);
                setCropRect({ x, y, w: width, h: height });
            };

            const endCrop = () => {
                setIsDraggingCrop(false);
            };

            const applyCrop = (imageElementOrCanvas) => {
                if (!cropRect || cropRect.w < 5 || cropRect.h < 5) {
                    setIsCropping(false);
                    setCropRect(null);
                    return; 
                }
                const sourceImage = new Image();
                sourceImage.src = imageSrc;
                sourceImage.onload = () => {
                    const canvas = document.createElement('canvas');
                    const displayRect = imageElementOrCanvas.getBoundingClientRect();
                    const displayWidth = displayRect.width || imageElementOrCanvas.clientWidth;
                    const displayHeight = displayRect.height || imageElementOrCanvas.clientHeight;
                    const scaleX = sourceImage.width / displayWidth;
                    const scaleY = sourceImage.height / displayHeight;
                    canvas.width = cropRect.w * scaleX;
                    canvas.height = cropRect.h * scaleY;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(sourceImage, cropRect.x * scaleX, cropRect.y * scaleY, cropRect.w * scaleX, cropRect.h * scaleY, 0, 0, canvas.width, canvas.height);
                    const newDataUrl = canvas.toDataURL('image/jpeg');
                    setImageSrc(newDataUrl);
                    resetAnalysisState(); 
                };
            };

            const cancelCrop = () => {
                setIsCropping(false);
                setCropRect(null);
            };

            const openModal = () => {
                if (!isCropping) {
                    setModalViewMode(viewMode); 
                    setShowImageModal(true);
                }
            }

            const getLocalMaskBaseSrc = () => analysisBaseSrc || imageSrc;
            const getCalibrationBaseSrc = () => analysisBaseSrc || calibrationDisplaySrc || imageSrc;

            const getModalBaseSrc = () => (
                !isCropping && modalViewMode === 'color'
                    ? getLocalMaskBaseSrc()
                    : imageSrc
            );

            // Real-time update for calibration AND initial preview
            useEffect(() => {
                if (imageSrc && canvasRef.current && overlayRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.src = imageSrc;
                    img.onload = () => {
                        const sourceMimeType = getImagePayload(imageSrc).mimeType;
                        const displayMimeType = sourceMimeType === 'image/png' ? 'image/png' : 'image/jpeg';
                        const { width: scaledWidth, height: scaledHeight } = getScaledImageDimensions(img.width, img.height, CALIBRATION_IMAGE_MAX_EDGE);

                        try {
                            const displayCanvas = document.createElement('canvas');
                            displayCanvas.width = scaledWidth;
                            displayCanvas.height = scaledHeight;
                            displayCanvas.getContext('2d').drawImage(img, 0, 0, scaledWidth, scaledHeight);
                            const normalizedPreviewSrc = displayCanvas.toDataURL(displayMimeType, 0.95);
                            setCalibrationDisplaySrc(normalizedPreviewSrc);
                        } catch (normalizationError) {
                            console.warn('Kalibrierungsbild konnte nicht normalisiert werden:', normalizationError);
                            setCalibrationDisplaySrc(imageSrc);
                        }

                        canvas.width = scaledWidth;
                        canvas.height = scaledHeight;
                        ctx.drawImage(img, 0, 0, scaledWidth, scaledHeight);
                        setAnalysisBaseSrc(canvas.toDataURL('image/jpeg', 0.92));

                        imageDataRef.current = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                        hsvDataRef.current = buildHsvLookup(imageDataRef.current);
                        textureDataRef.current = buildTextureLookup(imageDataRef.current, canvas.width, canvas.height);

                        if (!manualOverridesRef.current || manualOverridesRef.current.length !== canvas.width * canvas.height) {
                            manualOverridesRef.current = new Uint8Array(canvas.width * canvas.height);
                        }

                        setTimeout(() => {
                            const stats = analyzeColorBased(thresholds, true); 
                            setCalibrationStats(stats); 
                        }, 50);
                    };
                }
            }, [imageSrc]); 

            // Calibration real-time update
            useEffect(() => {
                if(isCalibrationOpen && imageSrc) {
                    scheduleCalibrationPreview({}, 0);
                }
            }, [isCalibrationOpen, imageSrc, calibrationPoints, calibrationMode, standardMaskVisibility, useStandardFallback, highlightUnclassified, unclassifiedFallback]);

            useEffect(() => {
                calibrationPointsRef.current = calibrationPoints;
            }, [calibrationPoints]);

            const getCalibrationReferenceRect = () => {
                const previewCanvas = calibrationPreviewCanvasRef.current;
                const imageElement = calibrationImageRef.current;
                const frame = calibrationFrameRef.current;
                const canvas = canvasRef.current;
                if (!canvas) return null;

                if (previewCanvas) {
                    const previewRect = previewCanvas.getBoundingClientRect();
                    if (previewRect?.width && previewRect?.height) return previewRect;
                }

                if (imageElement) {
                    const imageRect = imageElement.getBoundingClientRect();
                    if (imageRect?.width && imageRect?.height) return imageRect;
                }

                return frame ? getObjectContainContentRect(frame, canvas.width, canvas.height) : null;
            };

            const getCalibrationCanvasPoint = (clientX, clientY) => {
                const canvas = canvasRef.current;
                const rect = getCalibrationReferenceRect();
                if (!rect?.width || !rect?.height || !canvas?.width || !canvas?.height) return null;

                const relativeX = (clientX - rect.left) / rect.width;
                const relativeY = (clientY - rect.top) / rect.height;

                if (relativeX < 0 || relativeX > 1 || relativeY < 0 || relativeY > 1) return null;

                return {
                    canvas,
                    rect,
                    canvasX: Math.min(canvas.width - 1, Math.max(0, Math.floor(relativeX * canvas.width))),
                    canvasY: Math.min(canvas.height - 1, Math.max(0, Math.floor(relativeY * canvas.height)))
                };
            };

            const renderCalibrationPreview = useCallback(() => {
                const sourceCanvas = canvasRef.current;
                const targetCanvas = calibrationPreviewCanvasRef.current;
                if (!sourceCanvas || !targetCanvas || !sourceCanvas.width || !sourceCanvas.height) return;

                if (targetCanvas.width !== sourceCanvas.width || targetCanvas.height !== sourceCanvas.height) {
                    targetCanvas.width = sourceCanvas.width;
                    targetCanvas.height = sourceCanvas.height;
                }

                const targetCtx = targetCanvas.getContext('2d');
                targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
                targetCtx.drawImage(sourceCanvas, 0, 0, targetCanvas.width, targetCanvas.height);

                if (overlayRef.current?.width && overlayRef.current?.height) {
                    targetCtx.save();
                    targetCtx.globalAlpha = maskOpacity;
                    targetCtx.drawImage(overlayRef.current, 0, 0, targetCanvas.width, targetCanvas.height);
                    targetCtx.restore();
                }
            }, [maskOpacity, calibrationPreviewVersion]);

            useEffect(() => {
                if (!isCalibrationOpen) return;
                const frameId = window.requestAnimationFrame(renderCalibrationPreview);
                return () => window.cancelAnimationFrame(frameId);
            }, [isCalibrationOpen, imageSrc, analysisBaseSrc, calibrationDisplaySrc, calibrationPreviewVersion, renderCalibrationPreview]);

            // Point Picking Logic
            const handlePointPick = (e) => {
                if (!pickingCategory || !isCalibrationOpen || !imageDataRef.current) return;

                e.stopPropagation();

                const point = getCalibrationCanvasPoint(e.clientX, e.clientY);
                if (!point) return;

                const { canvas, canvasX, canvasY } = point;
                const idx = (canvasY * canvas.width + canvasX) * 4;
                const rawData = imageDataRef.current;
                const r = rawData[idx];
                const g = rawData[idx + 1];
                const b = rawData[idx + 2];
                const [h, s, v] = rgbToHsv(r, g, b);

                const newPoint = {
                    id: Date.now(),
                    h, s, v,
                    rgb: `rgb(${r},${g},${b})`,
                    category: pickingCategory,
                    tolerance: 4 // Default Tolerance set to 4
                };

                const nextPoints = applyCalibrationPoints([...calibrationPointsRef.current, newPoint]);
                refreshCalibrationPreview({ calibrationPoints: nextPoints });
                setPickingCategory(null); 
            };

            const handleResetCalibration = () => {
                if (!resetConfirmation) {
                    setResetConfirmation(true);
                    setTimeout(() => setResetConfirmation(false), 3000); 
                    return;
                }
                applyCalibrationPoints([]);
                setUseStandardFallback(true); 
                setUnclassifiedFallback(null); 
                refreshCalibrationPreview({ calibrationPoints: [], useStandardFallback: true, unclassifiedFallback: null });
                setResetConfirmation(false);
            };

            const handleNewCalibration = () => {
                if (!newCalibrationConfirmation) {
                    setNewCalibrationConfirmation(true);
                    setTimeout(() => setNewCalibrationConfirmation(false), 3000);
                    return;
                }
                applyCalibrationPoints([]);
                setUseStandardFallback(false); 
                setUnclassifiedFallback(null); 
                refreshCalibrationPreview({ calibrationPoints: [], useStandardFallback: false, unclassifiedFallback: null });
                setNewCalibrationConfirmation(false);
            };

            const applyCalibrationPoints = (nextPoints) => {
                calibrationPointsRef.current = nextPoints;
                setCalibrationPoints(nextPoints);
                return nextPoints;
            };

            const refreshCalibrationPreview = (options = {}) => {
                const stats = analyzeColorBased(
                    options.thresholds ?? thresholds,
                    options.isPreview ?? true,
                    options.remapUnclassifiedTo ?? null,
                    {
                        calibrationMode: options.calibrationMode ?? calibrationMode,
                        calibrationPoints: options.calibrationPoints ?? calibrationPointsRef.current,
                        useStandardFallback: options.useStandardFallback,
                        unclassifiedFallback: options.unclassifiedFallback,
                        standardMaskVisibility: options.standardMaskVisibility
                    }
                );
                setCalibrationStats(stats);
                return stats;
            };

            const clearScheduledCalibrationPreview = () => {
                if (calibrationPreviewDebounceRef.current) {
                    window.clearTimeout(calibrationPreviewDebounceRef.current);
                    calibrationPreviewDebounceRef.current = null;
                }

                if (calibrationPreviewAnimationFrameRef.current) {
                    window.cancelAnimationFrame(calibrationPreviewAnimationFrameRef.current);
                    calibrationPreviewAnimationFrameRef.current = null;
                }
            };

            const scheduleCalibrationPreview = (options = {}, delay = 80) => {
                pendingCalibrationPreviewOptionsRef.current = {
                    ...pendingCalibrationPreviewOptionsRef.current,
                    ...options
                };

                clearScheduledCalibrationPreview();

                const runPreview = () => {
                    calibrationPreviewDebounceRef.current = null;
                    calibrationPreviewAnimationFrameRef.current = window.requestAnimationFrame(() => {
                        const nextOptions = pendingCalibrationPreviewOptionsRef.current;
                        pendingCalibrationPreviewOptionsRef.current = {};
                        calibrationPreviewAnimationFrameRef.current = null;
                        refreshCalibrationPreview(nextOptions);
                    });
                };

                if (delay > 0) {
                    calibrationPreviewDebounceRef.current = window.setTimeout(runPreview, delay);
                } else {
                    runPreview();
                }
            };

            useEffect(() => clearScheduledCalibrationPreview, []);

            useEffect(() => () => {
                if (brushPreviewAnimationFrameRef.current) {
                    window.cancelAnimationFrame(brushPreviewAnimationFrameRef.current);
                    brushPreviewAnimationFrameRef.current = null;
                }
            }, []);

            const scheduleBrushPreviewUpdate = () => {
                if (brushPreviewAnimationFrameRef.current) return;

                brushPreviewAnimationFrameRef.current = window.requestAnimationFrame(() => {
                    brushPreviewAnimationFrameRef.current = null;
                    refreshCalibrationPreview();
                });
            };

            const commitBrushChanges = () => {
                if (!brushNeedsCommitRef.current) return;

                if (brushPreviewAnimationFrameRef.current) {
                    window.cancelAnimationFrame(brushPreviewAnimationFrameRef.current);
                    brushPreviewAnimationFrameRef.current = null;
                }

                brushNeedsCommitRef.current = false;
                analyzeColorBased(thresholds, false, null, {
                    calibrationMode,
                    calibrationPoints: calibrationPointsRef.current,
                    useStandardFallback
                });
            };

            const finishBrushInteraction = () => {
                endPan();
                commitBrushChanges();
                lastBrushStampRef.current = null;
                setIsDrawing(false);
            };

            const updatePoint = (id, field, value) => {
                const nextPoints = calibrationPointsRef.current.map(p => p.id === id ? { ...p, [field]: value } : p);
                return applyCalibrationPoints(nextPoints);
            };

            const deletePoint = (id) => {
                const nextPoints = calibrationPointsRef.current.filter(p => p.id !== id);
                return applyCalibrationPoints(nextPoints);
            };

            const setPointTolerance = (id, value) => {
                const parsedValue = Number.parseInt(value, 10);
                const safeValue = Math.min(100, Math.max(0, Number.isNaN(parsedValue) ? 0 : parsedValue));
                const nextPoints = updatePoint(id, 'tolerance', safeValue);
                refreshCalibrationPreview({ calibrationPoints: nextPoints });
            };

            const removeCalibrationPoint = (id) => {
                const nextPoints = deletePoint(id);
                refreshCalibrationPreview({ calibrationPoints: nextPoints });
            };

            const handleSaveCalibration = () => {
                const latestStats = refreshCalibrationPreview({ isPreview: true });
                if (latestStats && latestStats.unclassified > 0) {
                    setShowUnclassifiedModal(true);
                } else {
                    analyzeColorBased(thresholds, false, null, { calibrationMode, calibrationPoints: calibrationPointsRef.current, useStandardFallback }); 
                    setIsCalibrationOpen(false);
                }
            };

            const applyUnclassifiedDecision = (targetCategory) => {
                setUnclassifiedFallback(targetCategory); 
                analyzeColorBased(thresholds, false, targetCategory, { calibrationMode, calibrationPoints: calibrationPointsRef.current, useStandardFallback, unclassifiedFallback: targetCategory });
                setShowUnclassifiedModal(false);
                setIsCalibrationOpen(false);
            };

            // Brush Tool Logic
            const handleBrushDraw = (e) => {
                if (!brushActive || !isCalibrationOpen || !imageContainerRef.current || !manualOverridesRef.current) return;

                const containerRect = imageContainerRef.current.getBoundingClientRect();
                setCursorPos({ x: e.clientX - containerRect.left, y: e.clientY - containerRect.top });

                if (e.type === 'mousemove' && !isDrawing) return;

                const point = getCalibrationCanvasPoint(e.clientX, e.clientY);
                if (!point) return;

                const { canvas, rect, canvasX, canvasY } = point;
                const radius = Math.max(1, Math.floor((brushSize / rect.width) * canvas.width / 2));
                const stampKey = `${canvasX}:${canvasY}:${radius}:${brushMode}:${brushCategory}`;

                if (e.type === 'mousemove' && lastBrushStampRef.current === stampKey) return;
                lastBrushStampRef.current = stampKey;

                const overrides = manualOverridesRef.current;
                const brushOffsets = getBrushOffsetsForRadius(radius, brushOffsetCacheRef.current);
                const targetValues = { living: 1, dead: 2, stone: 3, soil: 4 };
                const targetVal = targetValues[brushCategory] || 0;
                let changed = false;

                for (const [dx, dy] of brushOffsets) {
                    const px = canvasX + dx;
                    const py = canvasY + dy;
                    if (px < 0 || px >= canvas.width || py < 0 || py >= canvas.height) continue;

                    const idx = py * canvas.width + px;

                    if (brushMode === 'add') {
                        if (overrides[idx] !== targetVal) {
                            overrides[idx] = targetVal;
                            changed = true;
                        }
                    } else if (overrides[idx] !== 0) {
                        overrides[idx] = 0;
                        changed = true;
                    }
                }

                if (changed) {
                    brushNeedsCommitRef.current = true;
                    scheduleBrushPreviewUpdate();
                }
            };

            const resetBrush = () => {
                if (manualOverridesRef.current) {
                    manualOverridesRef.current.fill(0);
                    refreshCalibrationPreview();
                }
            };

            // Effect to switch masks when active result changes
            useEffect(() => {
                if (!activeResult) return;

                if (activeResult.source.includes('Algorithm') || activeResult.source.includes('Algorithmus') || activeResult.source.includes('Punkt') || activeResult.source.includes('Hybrid')) {
                    if (colorMaskSrc) setMaskSrc(colorMaskSrc);
                } else if (activeResult.maskImage) {
                    setMaskSrc(activeResult.maskImage);
                } else {
                    setMaskSrc(null);
                }
            }, [activeResult, colorMaskSrc]);


            // --- Helper to Generate AI Mask ---
            const generateAIMask = async (imagePayload, contextPrompt) => {
                try {
                    const activeApiKey = getApiKey();
                    if (!activeApiKey) return null;
                    const prompt = contextPrompt || "Generate a segmentation mask image based on this input. Color code: Green for living plants, Yellow for dead/straw, Blue for stones, Brown for soil. High contrast, flat overlay.";
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL_ID}:generateContent?key=${activeApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: imagePayload.mimeType, data: imagePayload.data } }
                                ]
                            }],
                            generationConfig: { responseModalities: ['IMAGE'] }
                        })
                    });

                    if (!response.ok) return null;

                    const data = await response.json();
                    const imageBase64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    return imageBase64 ? `data:image/png;base64,${imageBase64}` : null;
                } catch (e) {
                    console.error("Mask generation failed", e);
                    return null;
                }
            };

            // NEW: Function to load mask on demand
            const loadMask = async (type) => {
                if (!imageSrc || !isUltraMode) return;

                if (!getApiKey()) {
                    openApiKeyModal(
                        () => loadMask(type),
                        'Bitte füge deinen Gemini API-Key ein, um die Maske zu generieren.'
                    );
                    return;
                }

                const resultData = type === 'ai' ? aiResult : synthesisResult;
                if (!resultData) return;

                setMaskLoading(type);
                setError(null);

                try {
                    const imagePayload = getImagePayload(imageSrc);
                    let maskPrompt = "";

                    if (type === 'ai') {
                        maskPrompt = `Generate a precise, hard-edged segmentation mask.
                            - Living = Pure Green (#00FF00)
                            - Dead/Straw = Bright Yellow (#FFFF00)
                            - Stones = Pure Blue (#0000FF)
                            - Soil = Dark Brown (#2F1B0C)
                            
                            CRITICAL: 
                            1. Represent the detected ratios EXACTLY: Living ${resultData.living}%, Dead ${resultData.dead}%, Soil ${resultData.soil}%.
                            2. Do NOT blend colors. Use flat, solid colors for high contrast. 
                            3. Ensure Dead Cover (Straw) is clearly Bright Yellow and NOT mixed with Dark Brown Soil.`;
                    } else {
                        maskPrompt = `Generate a precise, hard-edged segmentation mask based on the synthesized analysis.
                            - Living = Pure Green (#00FF00)
                            - Dead/Straw = Bright Yellow (#FFFF00)
                            - Stones = Pure Blue (#0000FF)
                            - Soil = Dark Brown (#2F1B0C)
                            
                            CRITICAL: 
                            1. Represent the synthesized ratios EXACTLY: Living ${resultData.living}%, Dead ${resultData.dead}%, Soil ${resultData.soil}%.
                            2. Do NOT blend colors. Use flat, solid colors for high contrast. 
                            3. Ensure Dead Cover (Straw) is clearly Bright Yellow and NOT mixed with Dark Brown Soil. Distinguish based on brightness.`;
                    }

                    const maskImage = await generateAIMask(imagePayload, maskPrompt);

                    if (maskImage) {
                        if (type === 'ai') {
                            setAiResult(prev => ({ ...prev, maskImage }));
                        } else {
                            setSynthesisResult(prev => ({ ...prev, maskImage }));
                        }
                        setViewMode(type);
                    } else {
                        throw new Error("Keine Maske generiert.");
                    }

                } catch (err) {
                    console.error(err);
                    setError(`Fehler beim Laden der ${type === 'ai' ? 'KI' : 'Synthese'}-Maske.`);
                } finally {
                    setMaskLoading(null);
                }
            };


            // 2. KI Analyse (Gemini 3 Pro)
            const analyzeWithGemini = async () => {
                const activeApiKey = getApiKey();
                if (!activeApiKey) {
                    openApiKeyModal(
                        () => handleAnalyze('ai'),
                        'Bitte füge deinen Gemini API-Key ein, um die KI-Analyse zu nutzen.'
                    );
                    setIsAnalyzing(false);
                    return;
                }

                try {
                    const imagePayload = getImagePayload(imageSrc);
                    const prompt = `
                        Analyze this top-down agricultural soil-cover image as an agronomic surface-cover assessment.

                        IMPORTANT AREA RULE:
                        Evaluate only the analyzable field/soil surface. Ignore metal counting frames, grid bars, measuring tools, labels, hands, shoes, or other non-field objects. Excluded objects must not be part of the 100% denominator.

                        CLASSIFY THE VISIBLE TOPMOST SURFACE INTO EXACTLY THESE 4 CATEGORIES:

                        1. living
                        Living plant cover. Include all green or greenish plant tissue, even if pale, yellow-green, shadowed, small, or partially hidden. Also include visible flowers or blossoms that belong to living plants, even if they are white, yellow, purple, pink, red, or blue.

                        2. dead
                        Dead plant material / crop residue / mulch. Include straw, dry leaves, stems, stalks, chaff, roots, decaying plant residues, and organic mulch. These may be yellow, beige, brown, grey, dark brown, or almost black. Use texture and shape: fibrous, linear, leaf-like, stem-like, flat plant fragments. Do not classify plant residue as soil just because it is brown or dark.

                        3. soil
                        Bare mineral soil. Include exposed earth, crumbs, aggregates, compacted soil, and fine granular material. Soil is usually continuous/granular and not fibrous or leaf/stem-shaped.

                        4. stone
                        Other visible field-surface objects that are not living plants, dead plant residue, or bare soil. Include stones, gravel, metal remnants inside the field surface, plastic, foreign material, and unclear non-biological objects. Do not include the excluded counting frame/grid.

                        PRIORITY RULE:
                        Classify the visible top layer only:
                        - If living plant tissue or flower covers soil, count it as living.
                        - If dead residue covers soil, count it as dead.
                        - Only count soil where it is visibly uncovered.
                        - Use stone/other only for remaining visible non-soil, non-plant objects or unclear residual areas.

                        QUANTIFICATION RULE:
                        Return integer percentages for living, dead, stone, and soil.
                        The four numbers must sum exactly to 100.
                        If uncertain, choose the most likely class based on texture and visible top layer.
                        Do not create an unclassified category.

                        Return ONLY a valid JSON object with German text values in this structure:
                        {
                            "living": number,
                            "dead": number,
                            "stone": number,
                            "soil": number,
                            "details": {

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>SoilCoverScan v6.21</title>
    <style>
        :root { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color-scheme: dark; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
        main { width: min(92vw, 30rem); padding: 2rem; border: 1px solid #334155; border-radius: 1rem; background: #1e293b; box-shadow: 0 1.5rem 4rem rgba(0,0,0,.3); text-align: center; }
        .spinner { width: 2.5rem; height: 2.5rem; margin: 0 auto 1rem; border: .25rem solid #334155; border-top-color: #22c55e; border-radius: 50%; animation: spin .8s linear infinite; }
        h1 { margin: 0; font-size: 1.25rem; }
        p { margin: .65rem 0 0; color: #94a3b8; line-height: 1.5; }
        .error { color: #fecaca; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <main id="status" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <h1>SoilCoverScan v6.21</h1>
        <p>Die Anwendung wird geladen und geprüft.</p>
    </main>
    <script>
        (() => {
            'use strict';

            const EXPECTED_SHA256 = '614be8a389b38c775556ddcd90c1423d63367bec46c10a3b40f49f430833be0b';
            const PART_PATHS = Array.from(
                { length: 8 },
                (_, index) => `assets/soilcoverscan-v6.21/part${String(index + 1).padStart(2, '0')}.b64`
            );

            const showError = (error) => {
                console.error('SoilCoverScan konnte nicht geladen werden:', error);
                const status = document.getElementById('status');
                status.innerHTML = `
                    <h1>SoilCoverScan konnte nicht geladen werden</h1>
                    <p class="error">${String(error?.message || error)}</p>
                    <p>Seite neu laden. Bleibt der Fehler bestehen, müssen die Release-Dateien im Repository geprüft werden.</p>
                `;
            };

            const decodeBase64 = (value) => {
                const binary = atob(value);
                const bytes = new Uint8Array(binary.length);
                for (let index = 0; index < binary.length; index += 1) {
                    bytes[index] = binary.charCodeAt(index);
                }
                return bytes;
            };

            const sha256 = async (bytes) => {
                if (!globalThis.crypto?.subtle) return null;
                const digest = await globalThis.crypto.subtle.digest('SHA-256', bytes);
                return Array.from(new Uint8Array(digest), byte => byte.toString(16).padStart(2, '0')).join('');
            };

            const start = async () => {
                if (!('DecompressionStream' in globalThis)) {
                    throw new Error('Dieser Browser unterstützt die erforderliche Dekomprimierung nicht.');
                }

                const parts = await Promise.all(PART_PATHS.map(async (path) => {
                    const response = await fetch(path, { cache: 'no-store' });
                    if (!response.ok) throw new Error(`Release-Datei fehlt: ${path} (${response.status})`);
                    return (await response.text()).trim();
                }));

                const compressedBytes = decodeBase64(parts.join(''));
                const decompressedStream = new Blob([compressedBytes])
                    .stream()
                    .pipeThrough(new DecompressionStream('gzip'));
                const htmlBytes = new Uint8Array(await new Response(decompressedStream).arrayBuffer());
                const actualHash = await sha256(htmlBytes);

                if (actualHash && actualHash !== EXPECTED_SHA256) {
                    throw new Error(`Integritätsprüfung fehlgeschlagen: ${actualHash}`);
                }

                const html = new TextDecoder('utf-8', { fatal: true }).decode(htmlBytes);
                if (!html.includes('const APP_VERSION = "v6.21";')) {
                    throw new Error('Die rekonstruierte Datei enthält nicht die erwartete Version v6.21.');
                }

                document.open();
                document.write(html);
                document.close();
            };

            start().catch(showError);
        })();
    </script>
</body>
</html>

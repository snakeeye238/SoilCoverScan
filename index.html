                                    ref={imageContainerRef}
                                    className={`relative flex-1 flex items-center justify-center overflow-hidden bg-[#0f172a] 
                                        ${brushActive ? 'cursor-none' : (pickingCategory ? 'cursor-crosshair' : (isPanning ? 'cursor-grabbing' : 'cursor-grab'))}
                                    `}
                                    onMouseDown={(e) => { 
                                        if (e.button === 2 || e.button === 1) { // Right click pan priority
                                            startPan(e);
                                        } else if (pickingCategory) {
                                            handlePointPick(e);
                                        } else {
                                            setIsDrawing(true); 
                                            handleBrushDraw(e); 
                                        }
                                    }}
                                    onMouseMove={(e) => {
                                        if (isPanning) doPan(e, calibPan, setCalibPan);
                                        else handleBrushDraw(e);
                                    }}
                                    onMouseUp={() => { finishBrushInteraction(); }}
                                    onMouseLeave={() => { finishBrushInteraction(); setShowCursor(false); }}
                                    onMouseEnter={() => setShowCursor(true)}
                                    onWheel={(e) => handleZoom(e, calibZoom, calibPan, setCalibZoom, setCalibPan, CALIBRATION_ZOOM_MAX)}
                                    onContextMenu={(e) => e.preventDefault()}
                                >
                                    <div 
                                        ref={calibrationFrameRef}
                                        style={{ 
                                            transform: `translate(${calibPan.x}px, ${calibPan.y}px) scale(${calibZoom})`,
                                            transformOrigin: '0 0',
                                            transition: isPanning ? 'none' : 'transform 0.1s ease-out'
                                        }}
                                        className="relative inline-block max-w-full max-h-full leading-none"
                                    >
                                        <canvas
                                            ref={calibrationPreviewCanvasRef}
                                            className="block max-w-full max-h-full shadow-lg"
                                        />
                                    </div>

                                    {brushActive && showCursor && !pickingCategory && (
                                        <div 
                                            className="pointer-events-none absolute rounded-full border-2 border-white shadow-[0_0_4px_rgba(0,0,0,0.8)] z-50 transform -translate-x-1/2 -translate-y-1/2"
                                            style={{
                                                left: cursorPos.x,
                                                top: cursorPos.y,
                                                width: `${brushSize}px`,
                                                height: `${brushSize}px`,
                                                backgroundColor: brushMode === 'subtract' ? 'rgba(255,255,255,0.3)' : 
                                                                 brushCategory === 'living' ? 'rgba(34,197,94,0.3)' :
                                                                 brushCategory === 'dead' ? 'rgba(234,179,8,0.3)' :
                                                                 brushCategory === 'stone' ? 'rgba(59,130,246,0.3)' : CALIBRATION_SOIL_MARK_COLOR.rgba
                                            }}
                                        />
                                    )}
                                </div>
                                
                                <div className="p-4 bg-[#1e293b] border-t border-slate-700 flex flex-col gap-4 shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.2)] z-20">
                                    
                                    <div className="flex justify-between items-center">
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => setShowCalibrationLiveStats(!showCalibrationLiveStats)}
                                                className={`p-2 rounded-lg transition-all border ${
                                                    showCalibrationLiveStats 
                                                    ? 'bg-indigo-600 text-white border-indigo-500 shadow-md' 
                                                    : 'bg-slate-700 text-slate-300 hover:bg-slate-600 border-slate-600'
                                                }`}
                                                title="Live-Ergebnisse anzeigen"
                                            >
                                                <BarChart2 className="h-5 w-5" />
                                            </button>

                                            <button 
                                                onClick={() => setHighlightUnclassified(!highlightUnclassified)}
                                                className={`p-2 rounded-lg transition-all border ${
                                                    highlightUnclassified 
                                                    ? 'bg-red-600 text-white border-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]' 
                                                    : 'bg-slate-700 text-slate-300 hover:bg-slate-600 border-slate-600'
                                                }`}
                                                title="Unklassifizierte Bereiche rot markieren"
                                            >
                                                {highlightUnclassified ? <Eye className="h-5 w-5"/> : <EyeOff className="h-5 w-5"/>}
                                            </button>

                                            <button 
                                                onClick={() => {
                                                    setBrushActive(!brushActive);
                                                    if (!brushActive) setPickingCategory(null); // Disable picking
                                                }}
                                                className={`p-2 rounded-lg transition-all border ${
                                                    brushActive 
                                                    ? 'bg-fuchsia-600 text-white border-fuchsia-500 shadow-md' 
                                                    : 'bg-slate-700 text-slate-300 hover:bg-slate-600 border-slate-600'
                                                }`}
                                                title="Pinselwerkzeug aktivieren"
                                            >
                                                <Brush className="h-5 w-5" />
                                            </button>

                                            {brushActive && (
                                                <button 
                                                    onClick={resetBrush}
                                                    className={`
                                                        flex items-center gap-1.5 px-3 py-2 ml-2
                                                        bg-red-500/20 hover:bg-red-500/30 text-red-300 
                                                        border border-red-500/30 rounded-lg 
                                                        text-xs font-bold transition-all
                                                    `}
                                                    title="Alle Pinselzeichnungen löschen"
                                                >
                                                    <RotateCcw className="h-3 w-3" />
                                                    Reset
                                                </button>
                                            )}
                                        </div>

                                        <div className={`
                                            flex items-center gap-3 bg-slate-900/50 px-3 py-2 
                                            rounded-lg border border-slate-700
                                        `}>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase">Deckkraft</span>
                                            <input 
                                                type="range" min="0" max="1" step="0.05" 
                                                value={maskOpacity}
                                                onChange={(e) => setMaskOpacity(parseFloat(e.target.value))}
                                                className="w-24 h-1.5 bg-slate-600 rounded-lg appearance-none cursor-pointer"
                                            />
                                            <span className="text-xs font-mono text-emerald-400 w-8 text-right">{Math.round(maskOpacity * 100)}%</span>
                                        </div>
                                    </div>

                                    {brushActive && (
                                        <div className="bg-slate-800/80 p-3 rounded-xl border border-slate-600 animate-in fade-in slide-in-from-top-2">
                                            <div className="flex flex-col gap-3">
                                                <div className="flex items-center gap-4">
                                                    <div className="flex bg-slate-900/80 rounded-lg p-1 border border-slate-700">
                                                        <button 
                                                            onClick={() => setBrushMode('add')}
                                                            className={`flex items-center gap-1 px-3 py-1.5 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors ${brushMode === 'add' ? 'bg-fuchsia-600 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}
                                                        >
                                                            <Plus className="h-3 w-3" /> Hinzufügen
                                                        </button>
                                                        <button 
                                                            onClick={() => setBrushMode('subtract')}
                                                            className={`flex items-center gap-1 px-3 py-1.5 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors ${brushMode === 'subtract' ? 'bg-slate-600 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}
                                                        >
                                                            <Minus className="h-3 w-3" /> Abziehen
                                                        </button>
                                                    </div>

                                                    <div className="flex-1 flex items-center gap-3 px-2">
                                                        <span className="text-xs font-bold text-slate-400">Größe:</span>
                                                        <input 
                                                            type="range" min="5" max="150" 
                                                            value={brushSize} 
                                                            onChange={(e) => setBrushSize(parseInt(e.target.value))}
                                                            className="flex-1 h-1.5 bg-slate-600 rounded-lg appearance-none cursor-pointer"
                                                        />
                                                        <span className="text-xs font-mono text-slate-300 w-8 text-right">{brushSize}px</span>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-4 gap-2">
                                                    <button onClick={() => setBrushCategory('living')} className={`py-1.5 rounded text-xs font-bold border transition-all ${brushCategory === 'living' ? 'bg-emerald-600 border-emerald-400 text-white shadow' : 'bg-slate-700 border-transparent text-slate-400 hover:bg-slate-600'}`}>Lebend</button>
                                                    <button onClick={() => setBrushCategory('dead')} className={`py-1.5 rounded text-xs font-bold border transition-all ${brushCategory === 'dead' ? 'bg-yellow-600 border-yellow-400 text-white shadow' : 'bg-slate-700 border-transparent text-slate-400 hover:bg-slate-600'}`}>Tot</button>
                                                    <button onClick={() => setBrushCategory('stone')} className={`py-1.5 rounded text-xs font-bold border transition-all ${brushCategory === 'stone' ? 'bg-blue-600 border-blue-400 text-white shadow' : 'bg-slate-700 border-transparent text-slate-400 hover:bg-slate-600'}`}>Stein</button>
                                                    <button onClick={() => setBrushCategory('soil')} className={`py-1.5 rounded text-xs font-bold border transition-all ${brushCategory === 'soil' ? 'bg-pink-600 border-pink-400 text-white shadow' : 'bg-slate-700 border-transparent text-slate-400 hover:bg-slate-600'}`}>Boden</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {showCalibrationLiveStats && calibrationStats && (
                                        <div className="bg-black/40 p-3 rounded-xl border border-slate-700 flex flex-wrap gap-4 text-xs animate-in fade-in slide-in-from-top-2 justify-around">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_5px_rgba(16,185,129,0.8)]"></div>
                                                <span className="text-emerald-300 font-bold">Lebend:</span>
                                                <span className="font-mono text-white text-sm">{calibrationStats.living}%</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-yellow-500 shadow-[0_0_5px_rgba(234,179,8,0.8)]"></div>
                                                <span className="text-yellow-300 font-bold">Tot:</span>
                                                <span className="font-mono text-white text-sm">{calibrationStats.dead}%</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_5px_rgba(59,130,246,0.8)]"></div>
                                                <span className="text-blue-300 font-bold">Steine:</span>
                                                <span className="font-mono text-white text-sm">{calibrationStats.stone}%</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-pink-500 shadow-[0_0_5px_rgba(236,72,153,0.8)]"></div>
                                                <span className="text-pink-300 font-bold">Boden:</span>
                                                <span className="font-mono text-white text-sm">{calibrationStats.soil}%</span>
                                            </div>
                                            {calibrationStats.unclassified > 0 && <div className="flex items-center gap-2 animate-pulse"><div className="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_red]"></div><span className="text-red-400 font-bold">???:</span><span className="font-mono text-white text-sm">{calibrationStats.unclassified}%</span></div>}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="w-1/2 flex flex-col bg-[#0f172a] text-slate-200 relative">
                                <div className="p-6 border-b border-slate-700 bg-[#1e293b] flex justify-between items-center shrink-0">
                                    <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                        <Target className="h-5 w-5 text-fuchsia-400"/>
                                        Kalibrierung
                                    </h2>
                                    <div className="flex items-center gap-2">
                                        {calibrationMode === 'standard' ? (
                                            <button 
                                                onClick={handleResetStandardThresholds} 
                                                className="px-3 py-1.5 rounded text-xs font-bold transition-all border bg-slate-700 text-slate-300 border-slate-600 hover:bg-slate-600"
                                            >
                                                Standard zurücksetzen
                                            </button>
                                        ) : (
                                            <>
                                                <button 
                                                    onClick={handleResetCalibration} 
                                                    className={`px-3 py-1.5 rounded text-xs font-bold transition-all border ${resetConfirmation ? 'bg-red-600 text-white border-red-500 animate-pulse' : 'bg-slate-700 text-slate-300 border-slate-600 hover:bg-slate-600'}`}
                                                >
                                                    {resetConfirmation ? 'Wirklich zurücksetzen?' : 'Reset (Standard)'}
                                                </button>

                                                <button 
                                                    onClick={handleNewCalibration} 
                                                    className={`px-3 py-1.5 rounded text-xs font-bold transition-all border ${newCalibrationConfirmation ? 'bg-fuchsia-600 text-white border-fuchsia-500 animate-pulse' : 'bg-indigo-900/50 text-indigo-300 border-indigo-700 hover:bg-indigo-800'}`}
                                                    title="Löscht Standard-Algorithmus und startet leere Punkt-Kalibrierung"
                                                >
                                                    {newCalibrationConfirmation ? 'Alles löschen?' : 'Neue Kalibrierung'}
                                                </button>
                                            </>
                                        )}

                                        <button onClick={() => setIsCalibrationOpen(false)} className="text-slate-400 hover:text-white transition-colors ml-2">
                                            <X className="h-6 w-6" />
                                        </button>
                                    </div>
                                </div>

                                <div className="p-3 border-b border-slate-700 bg-[#111827] shrink-0">
                                    <div className="grid grid-cols-2 gap-2">
                                        {calibrationModeTabs.map(mode => {
                                            const ModeIcon = mode.Icon;
                                            const isActiveMode = calibrationMode === mode.id;
                                            return (
                                                <button
                                                    key={mode.id}
                                                    onClick={() => handleCalibrationModeChange(mode.id)}
                                                    className={`py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2 border transition-all ${
                                                        isActiveMode
                                                            ? 'bg-fuchsia-600 text-white border-fuchsia-500 shadow-lg'
                                                            : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700 hover:text-white'
                                                    }`}
                                                >
                                                    <ModeIcon className="h-3.5 w-3.5" />
                                                    {mode.label}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                                <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                                    {calibrationMode === 'standard' ? (
                                        <div className="space-y-4">
                                            <div className="flex justify-end">
                                                <button
                                                    onClick={handleResetStandardMaskVisibility}
                                                    className="px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 transition-all border bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700"
                                                >
                                                    <Eye className="h-3 w-3" />
                                                    Nur Lebend anzeigen
                                                </button>
                                            </div>
                                            {STANDARD_CALIBRATION_SECTIONS.map(section => {
                                                const isSectionMaskVisible = standardMaskVisibility[section.category];
                                                return (
                                                <div key={section.id} className={`bg-slate-800/50 p-4 rounded-xl border transition-all ${isSectionMaskVisible ? 'border-slate-600' : 'border-slate-800 opacity-80'}`}>
                                                    <div className="flex justify-between items-center mb-4 gap-3">
                                                        <h3 className={`text-sm uppercase tracking-wider font-bold flex items-center gap-2 ${section.text}`}>
                                                            <div className={`w-2 h-2 rounded-full ${section.color} shadow-[0_0_10px_rgba(255,255,255,0.2)]`}></div>
                                                            {section.label}
                                                        </h3>
                                                        <button
                                                            onClick={() => setStandardCategoryMaskVisibility(section.category, !isSectionMaskVisible)}
                                                            className={`px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 transition-all border ${
                                                                isSectionMaskVisible
                                                                    ? 'bg-slate-700 text-white border-slate-500 hover:bg-slate-600'
                                                                    : 'bg-slate-900 text-slate-400 border-slate-700 hover:text-white hover:bg-slate-700'
                                                            }`}
                                                        >
                                                            {isSectionMaskVisible ? <Eye className="h-3 w-3" /> : <EyeOff className="h-3 w-3" />}
                                                            {isSectionMaskVisible ? 'Ausblenden' : 'Einblenden'}
                                                        </button>
                                                    </div>

                                                    <div className="space-y-4">
                                                        {section.sliders.length > 0 ? section.sliders.map(renderThresholdSlider) : (
                                                            <div className="text-xs text-slate-400 bg-slate-900/60 border border-slate-700 rounded-lg px-3 py-2">
                                                                Alles, was nach den Standard-Regeln nicht eindeutig erkannt wird, wird am Ende Abgestorben.
                                                            </div>
                                                        )}


                                                    </div>
                                                </div>
                                                );
                                            })}
                                        </div>
                                    ) : (
                                        <>
                                            {categories.map(cat => (
                                                <div key={cat.id} className={`bg-slate-800/50 p-4 rounded-xl border ${pickingCategory === cat.id ? 'border-fuchsia-500 ring-1 ring-fuchsia-500' : 'border-slate-700'} transition-all`}>
                                                    <div className="flex justify-between items-center mb-3">
                                                        <h3 className={`text-sm uppercase tracking-wider font-bold flex items-center gap-2 ${cat.text}`}>
                                                            <div className={`w-2 h-2 rounded-full ${cat.color} shadow-[0_0_10px_rgba(255,255,255,0.2)]`}></div>
                                                            {cat.label}
                                                        </h3>
                                                        <button 
                                                            onClick={() => { setPickingCategory(prev => prev === cat.id ? null : cat.id); setBrushActive(false); }} 
                                                            className={`px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 transition-all border ${pickingCategory === cat.id ? 'bg-fuchsia-600 text-white border-fuchsia-500 shadow-md' : 'bg-slate-700 text-slate-300 border-slate-600 hover:bg-slate-600'}`}
                                                        >
                                                            {pickingCategory === cat.id ? 'Wähle Punkt...' : <><Plus className="h-3 w-3" /> Hinzufügen</>}
                                                        </button>
                                                    </div>

                                                    <div className="space-y-2">
                                                        {calibrationPoints.filter(p => p.category === cat.id).length === 0 ? (
                                                            <p className="text-[10px] text-slate-500 italic text-center py-2">
                                                                {useStandardFallback ? 'Standard-Werte aktiv.' : 'Keine Punkte definiert.'}
                                                            </p>
                                                        ) : (
                                                            calibrationPoints.filter(p => p.category === cat.id).map(point => (
                                                                <div key={point.id} className="flex items-center gap-2 bg-slate-900/50 p-2 rounded-lg border border-slate-700/50 animate-in fade-in slide-in-from-left-2">
                                                                    <div className="w-6 h-6 rounded-full shadow-inner border border-white/10 shrink-0" style={{backgroundColor: point.rgb}} title={`H:${Math.round(point.h)} S:${Math.round(point.s)}`}></div>
                                                                    <div className="flex-1 flex items-center gap-1">
                                                                        <span className="text-[10px] font-bold text-slate-500 uppercase mr-1">Tol.</span>

                                                                        <button 
                                                                            onClick={() => { 
                                                                                setPointTolerance(point.id, point.tolerance - 1); 
                                                                            }}
                                                                            className="w-5 h-5 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded text-slate-300 text-xs font-bold transition-colors"
                                                                        >
                                                                            -
                                                                        </button>

                                                                        <input 
                                                                            type="range" min="0" max="100" 
                                                                            value={point.tolerance} 
                                                                            onChange={(e) => { 
                                                                                setPointTolerance(point.id, e.target.value); 
                                                                            }} 
                                                                            className="flex-1 h-1 bg-slate-600 rounded-lg appearance-none cursor-pointer mx-1"
                                                                        />

                                                                        <button 
                                                                            onClick={() => { 
                                                                                setPointTolerance(point.id, point.tolerance + 1); 
                                                                            }}
                                                                            className="w-5 h-5 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded text-slate-300 text-xs font-bold transition-colors"
                                                                        >
                                                                            +
                                                                        </button>

                                                                        <span className="text-[10px] font-mono text-slate-400 w-6 text-right">{point.tolerance}</span>
                                                                    </div>
                                                                    <button 
                                                                        onClick={() => { 
                                                                            removeCalibrationPoint(point.id); 
                                                                        }} 
                                                                        className="text-slate-500 hover:text-red-400 p-1"
                                                                    >
                                                                        <X className="h-3 w-3"/>
                                                                    </button>
                                                                </div>
                                                            ))
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    )}
                                </div>
                                <div className="p-4 border-t border-slate-700 bg-[#1e293b] flex justify-end shrink-0">
                                    <button 
                                        onClick={handleSaveCalibration} 
                                        className="px-6 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 shadow-lg transition-transform active:scale-95"
                                    >
                                        Fertig & Speichern
                                    </button>
                                </div>
                                
                                {showUnclassifiedModal && (
                                    <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-in fade-in">
                                        <div className="bg-slate-800 border border-slate-600 rounded-2xl p-6 shadow-2xl max-w-sm w-full text-center">
                                            <div className="w-12 h-12 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                                                <AlertCircle className="h-6 w-6 text-red-500"/>
                                            </div>
                                            <h3 className="text-lg font-bold text-white mb-2">Unklassifizierte Bereiche</h3>
                                            <p className="text-sm text-slate-300 mb-6">
                                                Es wurden <strong>{calibrationStats?.unclassified}%</strong> der Fläche nicht erkannt. 
                                                Wie sollen diese Bereiche zugeordnet werden?
                                            </p>
                                            <div className="flex flex-col gap-3">
                                                <button onClick={() => applyUnclassifiedDecision('soil')} className="w-full py-2.5 bg-pink-600 hover:bg-pink-700 text-white rounded-lg font-bold transition-colors flex items-center justify-center gap-2">
                                                    <Square className="h-4 w-4"/> Als Boden werten (Empfohlen)
                                                </button>
                                                <button onClick={() => applyUnclassifiedDecision('dead')} className="w-full py-2.5 bg-yellow-600 hover:bg-yellow-700 text-white rounded-lg font-bold transition-colors flex items-center justify-center gap-2">
                                                    <AlertCircle className="h-4 w-4"/> Als Abgestorben werten
                                                </button>
                                                <button onClick={() => applyUnclassifiedDecision(null)} className="w-full py-2.5 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg text-sm font-medium transition-colors">
                                                    Ignorieren (Transparent lassen)
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
